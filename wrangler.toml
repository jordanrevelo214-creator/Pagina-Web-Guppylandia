name = "guppylandia"
compatibility_date = "2025-01-01"

# Configuración de la base de datos D1
[[d1_databases]]
binding = "DB"                    # Nombre con el que accedemos a la BD en el código
database_name = "guppylandia-db"  # Nombre de la BD en Cloudflare
database_id = "local"             # Se reemplaza cuando se crea en producción
